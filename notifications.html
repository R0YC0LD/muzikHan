<!DOCTYPE html>
<html lang="tr">
<head>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#030303">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="simge.png" type="image/png">
  <title>Bildirimler - MüzikHan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=5">
</head>
<body>
  <div class="app-container">
    
    <div id="sidebar-container"></div>
    
    <div class="main-content">
      <div id="navbar-container"></div>

      <div class="card" data-role="all">
        <div style="display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:10px; margin-bottom: 1.5rem;">
          <h3 style="margin:0; color: var(--shn-pink);">Bildirimler</h3>
          <button class="btn btn-ghost btn-sm" id="clear-all-notifs-btn" style="color:var(--bad);">🗑️ Tümünü Sil</button>
        </div>
        <p class="text-mut" style="margin-bottom: 2rem;">Son hareketler ve size gelen değerlendirmeler. Bildirimler 24 saat sonra otomatik silinir.</p>

        <div id="notifications-list" style="display:flex; flex-direction:column; gap:1rem;">
          <p>Bildirimler yükleniyor...</p>
        </div>
      </div>
      
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/notifications.js"></script>
</body>
</html>
