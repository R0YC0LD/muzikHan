<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Giriş Yap - MüzikHan SaaS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="card auth-box">
      <h2 style="text-align: center; margin-bottom: 1.5rem;">MüzikHan Giriş</h2>
      <input type="email" id="email" placeholder="E-posta Adresi" class="mb-3" style="margin-bottom: 1rem;">
      <input type="password" id="password" placeholder="Şifre" class="mb-3" style="margin-bottom: 1rem;">
      <button id="login-btn" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;">Sisteme Gir</button>
      <button id="register-btn" class="btn btn-ghost" style="width: 100%;">Hesabın Yok Mu? Kayıt Ol</button>
      <p id="error-msg" style="color: var(--bad); text-align: center; margin-top: 1rem;"></p>
    </div>
  </div>

  <script type="module">
    import { initAuth, login, registerUser } from './js/auth.js';
    initAuth();

    document.getElementById('login-btn').addEventListener('click', async () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('password').value;
      const err = document.getElementById('error-msg');
      try {
        await login(e, p);
      } catch(error) {
        err.innerText = error.message;
      }
    });

    document.getElementById('register-btn').addEventListener('click', async () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('password').value;
      const err = document.getElementById('error-msg');
      if(p.length < 6) return err.innerText = "Şifre en az 6 karakter olmalı.";
      try {
        await registerUser(e, p);
      } catch(error) {
        err.innerText = error.message;
      }
    });
  </script>
</body>
</html>
